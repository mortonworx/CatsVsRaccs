name: Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: Release tag to build and publish
        required: true
        default: v0.1.0
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ inputs.tag_name || github.ref_name }}
  APP_VERSION: ${{ inputs.tag_name || github.ref_name }}
  PYTHON_VERSION: "3.11"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15-intel
            artifact_name: catsvsraccs-macos-x64
          - os: macos-14
            artifact_name: catsvsraccs-macos-arm64
          - os: windows-latest
            artifact_name: catsvsraccs-windows-x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install build dependencies
        run: python -m pip install --upgrade pip "setuptools<81" wheel nuitka zstandard ordered-set pillow imageio

      - name: Build release binary
        if: runner.os != 'Windows'
        run: python scripts/build_release.py

      - name: Build release binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          "yes" | python scripts/build_release.py

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: release-artifacts/*.zip
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: bundled-artifacts

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: false
          tag_name: ${{ env.RELEASE_TAG }}
          name: CatsVsRaccs ${{ env.RELEASE_TAG }}
          files: bundled-artifacts/**/*.zip
